name: Sync Pocket Casts & Deploy

on:
  schedule:
    - cron: "0 */12 * * *"  # Every 12 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync listening history
        env:
          POCKETCASTS_EMAIL: ${{ secrets.POCKETCASTS_EMAIL }}
          POCKETCASTS_PASSWORD: ${{ secrets.POCKETCASTS_PASSWORD }}
        run: python sync.py

      - name: Build site
        run: python build_site.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "Update listening history"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
