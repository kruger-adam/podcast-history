<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Podcast History</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #7c6bf5;
      --accent-dim: #5a4cc2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stat {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .stat-num {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .month-header {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .month-header:first-child {
      margin-top: 0;
    }

    .episode {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .episode:last-child {
      border-bottom: none;
    }

    .episode-podcast {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.15rem;
    }

    .episode-title {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .episode-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }

    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1rem; }
      .stats { gap: 1rem; flex-wrap: wrap; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Podcast History</h1>
    <p class="subtitle">What I've been listening to lately</p>

    
    <div class="stats">
      <div class="stat"><span class="stat-num">0</span> episodes</div>
      <div class="stat"><span class="stat-num">0</span> podcasts</div>
      <div class="stat"><span class="stat-num">0</span> minutes</div>
    </div>
    

    

    <div class="footer">
      Last synced: April 08, 2026 at 12:35 AM UTC<br>
      Powered by Pocket Casts
    </div>
  </div>
</body>
</html>
