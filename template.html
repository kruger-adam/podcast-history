<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Podcast History</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #7c6bf5;
      --accent-dim: #5a4cc2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stat {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .stat-num {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-detail {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-dim);
    }

    .month-header {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .month-header:first-child {
      margin-top: 0;
    }

    .episode {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .episode:last-child {
      border-bottom: none;
    }

    .episode-art {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      flex-shrink: 0;
      object-fit: cover;
    }

    .episode-info {
      min-width: 0;
    }

    .episode-podcast {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.15rem;
    }

    a.episode-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      display: block;
    }

    a.episode-title:hover {
      color: var(--accent);
    }

    .episode-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }

    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
    }

    .episode-notes {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
      padding: 0.4rem 0.6rem;
      background: var(--surface);
      border-left: 2px solid var(--accent-dim);
      border-radius: 0 6px 6px 0;
    }

    .episode-notes .note-preview {
      display: inline;
    }

    .episode-notes .note-full {
      display: none;
    }

    .episode-notes.expanded .note-preview {
      display: none;
    }

    .episode-notes.expanded .note-full {
      display: block;
    }

    .note-toggle {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.75rem;
      margin-left: 0.3rem;
    }

    .note-label {
      color: var(--accent);
      font-weight: 600;
    }

    .podcast-stats {
      margin-bottom: 2rem;
    }

    .podcast-list.collapsed {
      display: none;
    }

    .podcast-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }

    .podcast-row:last-child {
      border-bottom: none;
    }

    .podcast-row-art {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      flex-shrink: 0;
      object-fit: cover;
    }

    .podcast-row-info {
      flex: 1;
      min-width: 0;
    }

    .podcast-row-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .podcast-row-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
    }

    .podcast-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 0.35rem;
    }

    .podcast-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1rem; }
      .stats { gap: 1rem; flex-wrap: wrap; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Podcast History</h1>
    <p class="subtitle">What I've been listening to lately</p>

    {{STATS}}

    {{PODCAST_STATS}}

    {{EPISODES}}

    <div class="footer">
      Last synced: {{LAST_SYNCED}}<br>
      Powered by Pocket Casts
    </div>
  </div>
  <script>
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('note-toggle')) {
        var notes = e.target.closest('.episode-notes');
        notes.classList.toggle('expanded');
        e.target.textContent = notes.classList.contains('expanded') ? 'less' : 'more';
      }
    });
  </script>
</body>
</html>
